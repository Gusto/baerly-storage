pre-commit:
  piped: true
  skip:
    - merge
    - rebase
  commands:
    format:
      glob: "*.{ts,tsx,mjs,cjs,json,md}"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,mjs,cjs}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm verify
