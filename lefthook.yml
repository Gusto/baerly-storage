pre-commit:
  piped: true
  skip:
    - merge
    - rebase
  commands:
    format:
      glob: "*.{ts,tsx,mjs,cjs,json,md}"
      # Keep this hook's scope aligned with the `oxfmt tests packages` gate
      # (package.json "format"/"format:check"). examples/ are deliberately
      # outside that gate, and oxfmt mangles the example AGENTS.md prose
      # (strips blockquote/list-continuation prefixes, escapes `_VAR_*` as
      # emphasis, appends illegal `;` to JSX fences, widens tables). Because
      # the gate never re-validates examples/, that damage would ship
      # silently with stage_fixed. So exclude examples/ here too.
      exclude:
        - "examples/**/*"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,mjs,cjs}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm verify
    # Bundle budgets live in `pnpm test` (bundle-size.test.ts) and CI, NOT
    # in `pnpm verify` above — so a kernel/maintenance edit that blows a
    # budget commits green and only goes red when you finally run the full
    # suite or CI fires post-merge. That lag is why budget overruns reach
    # main. Run the budget check here, scoped to bundle-affecting source so
    # doc/test/changeset/example commits stay fast. `pnpm bundle-sizes`
    # self-builds (rolldown ~2.5s) then runs the budget test (~0.3s); it
    # only fires when a staged file matches the glob below.
    bundle-size:
      glob:
        - "packages/**/*.{ts,tsx}"
        - "rolldown.config.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
      run: pnpm bundle-sizes
