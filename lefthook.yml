pre-commit:
  piped: true
  commands:
    format:
      glob: "*.{ts,tsx,mjs,cjs,json}"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,mjs,cjs}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    typecheck:
      run: pnpm typecheck
    check-references:
      run: pnpm check:references
