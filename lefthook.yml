pre-commit:
  piped: true
  skip:
    - merge
    - rebase
  commands:
    format:
      # oxfmt owns code/markup only. Markdown is validated (verify:docs), never
      # reformatted — so no `md`/`mdx` here and no examples/ exclude. This is a
      # fast local mirror of the config-driven `oxfmt .` gate; .oxfmtrc.json
      # `ignorePatterns` is the single source of truth for what's skipped (it
      # excludes markdown + regenerated evidence even if such a file is staged
      # and passed explicitly, so this hook cannot corrupt prose).
      glob: "*.{ts,tsx,mts,cts,mjs,cjs,js,json,jsonc,html,css}"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,mjs,cjs}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    # Code gate. Runs `verify:code` (the full `verify` chain MINUS
    # `verify:docs`) so a `.ts`/`.tsx` commit doesn't pay ~3.75s of markdown +
    # mermaid validation that a code change can't affect. Markdown is covered
    # by the `docs` command below instead. `pnpm verify` (= verify:code &&
    # verify:docs) is still what humans/CI run for the whole gate.
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm run verify:code
    # Docs gate. The code commands above are all code-globbed, so before this a
    # docs-only commit ran ZERO validation locally — a broken cross-link or
    # malformed mermaid only surfaced in CI. This fires verify:docs (remark
    # link/anchor + mermaid parse + frontmatter/taxonomy) whenever markdown is
    # staged, the local mirror of the verify:docs checks `pnpm verify` runs in
    # CI (there is no separate docs.yml workflow). A mixed code+docs commit
    # runs verify:code once (typecheck, above) and verify:docs once (here) — no
    # double-run, because verify:code excludes the docs checks.
    docs:
      glob: "*.md"
      run: pnpm run verify:docs
    # Bundle budgets live in `pnpm test` (bundle-size.test.ts) and CI, NOT
    # in `pnpm verify` above — so a kernel/maintenance edit that blows a
    # budget commits green and only goes red when you finally run the full
    # suite or CI fires post-merge. That lag is why budget overruns reach
    # main. Run the budget check here, scoped to bundle-affecting source so
    # doc/test/changeset/example commits stay fast. `pnpm bundle-sizes`
    # self-builds (rolldown ~2.5s) then runs the budget test (~0.3s); it
    # only fires when a staged file matches the glob below.
    bundle-size:
      glob:
        - "packages/**/*.{ts,tsx}"
        - "rolldown.config.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
      run: pnpm bundle-sizes
