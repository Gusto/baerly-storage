# Pre-commit hooks for MPS3.
#
# Runs `pnpm verify` (typecheck + lint) and `pnpm check:references`
# (banlist scan from .deprecated-tokens.txt). Tests and format:check
# are intentionally excluded — their baselines aren't clean. See
# CLAUDE.md "Verification" section.
#
# Bypass with `git commit --no-verify` when needed.

pre-commit:
  commands:
    verify:
      run: pnpm verify
    check-references:
      run: pnpm check:references
