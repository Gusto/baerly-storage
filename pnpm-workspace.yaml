packages:
  - packages/*
  - examples/*
  - examples/*/apps/*

# `workerd` ships a native binary postinstalled by
# `@cloudflare/vitest-pool-workers`. The other entries are already
# allowed elsewhere in the workspace but pnpm 10 wants the full
# allowlist enumerated here.
onlyBuiltDependencies:
  - esbuild
  - workerd
