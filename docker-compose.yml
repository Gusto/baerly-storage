name: baerly-storage

services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data/minio --console-address :9090
    ports:
      - ${BAERLY_MINIO_HOST_PORT:-9102}:9000
      - 9103:9090
    environment:
      MINIO_ROOT_USER: baerly
      MINIO_ROOT_PASSWORD: ZOAmumEzdsUUcVlQ
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 30

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    command: ["-host=0.0.0.0", "-config=/etc/toxiproxy/config.json"]
    ports:
      - ${BAERLY_TOXIPROXY_HOST_PORT:-9104}:9104
      - ${BAERLY_TOXIPROXY_ADMIN_PORT:-8474}:8474
    volumes:
      - ./docker/toxiproxy.json:/etc/toxiproxy/config.json:ro
    environment:
      LOG_LEVEL: debug
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 2s
      timeout: 2s
      retries: 20

  postgres:
    image: postgres:16.13-alpine
    # Host port 5433 to avoid clashing with a local dev Postgres on 5432.
    ports:
      - ${BAERLY_POSTGRES_HOST_PORT:-5433}:5432
    environment:
      POSTGRES_USER: baerly
      POSTGRES_PASSWORD: baerly-local
      POSTGRES_DB: baerly_export_smoke
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baerly -d baerly_export_smoke"]
      interval: 2s
      timeout: 2s
      retries: 20
