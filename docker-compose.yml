version: '3'
services:
  minio:
    image: 'minio/minio:latest'
    platform: linux/amd64
    ports:
      - '9102:9000'
      - '9103:9090'
    environment:
      MINIO_ROOT_USER: 'mps3'
      MINIO_ROOT_PASSWORD: 'ZOAmumEzdsUUcVlQ'
    command: minio server /data/minio --console-address ":9090"

  toxiproxy:
    image: "ghcr.io/shopify/toxiproxy"
    platform: linux/amd64
    ports:
      - '9104:9104'
      - '8474:8474' # toxiproxy admin
    environment:
      LOG_LEVEL: "DEBUG"
  
  toxiproxy-config-0:
    image: "ghcr.io/shopify/toxiproxy"
    entrypoint: >
      /toxiproxy-cli -h toxiproxy:8474 create -l 0.0.0.0:9104 -u minio:9000 minio 
    depends_on: 
      - toxiproxy

  # toxiproxy-config-1:
  #   image: "ghcr.io/shopify/toxiproxy"
  #   entrypoint: >
  #     /toxiproxy-cli -h toxiproxy:8474 toxic add --type reset_peer --attribute timeout=1 --toxicity 0.1 minio
  #   depends_on:
  #     - toxiproxy-config-0

  postgres:
    image: 'postgres:16-alpine'
    platform: linux/amd64
    ports:
      # Host port 5433 to avoid clashing with a local dev Postgres on 5432.
      - '5433:5432'
    environment:
      POSTGRES_USER: 'baerly'
      POSTGRES_PASSWORD: 'baerly-local'
      POSTGRES_DB: 'baerly_export_smoke'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baerly -d baerly_export_smoke"]
      interval: 2s
      timeout: 2s
      retries: 20
