# Hand-rolled Wrangler config for {{appName}}.
# NOT a production template — see deploy/README.md in the source repo
# for the gate lifecycle this was based on. Ticket 39 extends this
# file with `wrangler.jsonc`, richer `[[r2_buckets]]` declarations,
# and `baerly deploy` orchestration.

name = "{{appName}}"
main = "src/worker.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# R2 binding. Bucket must exist before `wrangler deploy`; create it
# with `wrangler r2 bucket create {{appName}}`.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "{{appName}}"

# Single-tenant deploy. The inline sharedSecret Verifier pins
# tenantPrefix to "{{tenant}}"; TENANT is ignored when a Verifier is
# wired (baerlyWorker reads tenantPrefix off the Verifier result).
[vars]
APP = "{{appName}}"
TENANT = "{{tenant}}"

# SHARED_SECRET is injected via `wrangler secret put SHARED_SECRET`
# at deploy time, NOT committed to this file.

# Optional: Cron Trigger for the maintenance loop.
[triggers]
crons = ["* * * * *"]

# Standard plan — required for the 25s long-poll budget. Free tier
# (10ms CPU) cannot complete the long-poll cascade.
[limits]
cpu_ms = 50

# Observability — enable Workers Logpush if you have the entitlement;
# otherwise `wrangler tail` is sufficient.
# [observability]
# enabled = true
